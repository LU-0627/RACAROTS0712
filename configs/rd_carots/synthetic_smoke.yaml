MODEL:
  NAME: "RDCAROTS"

SEED: 0

DATA:
  BASE_DIR: "${DATA_ROOT}"
  NAME: "synthetic_regime_delay"
  SCALE: "standard"
  WIN_SIZE: 10
  TRAIN_STEP: 1
  TEST_STEP: 1
  N_VAR: 50
  TRAIN_RATIO: 0.8

DATA_LOADER:
  NUM_WORKERS: 2
  PIN_MEMORY: True
  DROP_LAST: True

TRAIN:
  ENABLE: True
  BATCH_SIZE: 32
  SHUFFLE: True
  DROP_LAST: True
  CHECKPOINT_DIR: "${OUTPUT_ROOT}/checkpoints"
  EVAL_PERIOD: 1
  PRINT_FREQ: 10

VAL:
  ENABLE: True
  BATCH_SIZE: 64

TEST:
  ENABLE: True
  BATCH_SIZE: 64

SOLVER:
  MAX_EPOCH: 3
  START_EPOCH: 0
  LR: 0.001
  WEIGHT_DECAY: 0.0001
  OPTIMIZER: "Adam"
  GRADIENT_CLIP: True
  GRADIENT_CLIP_NORM: 1.0

RESULT_DIR: "${OUTPUT_ROOT}/results"

SYNTHETIC:
  N_TRAIN: 1000
  N_VAL: 200
  N_TEST: 500

RDCAROTS:
  IO_SCHEMA_PATH: "configs/io_schema/synthetic_regime_delay.yaml"
  TEST_MODE: "frozen"
  N_INPUTS: 20
  N_OUTPUTS: 30

  ENCODER_ARCH: "lstm"

  PROJECTOR:
    INPUT_DIM: 512
    HIDDEN_DIM: 512
    OUTPUT_DIM: 512

  DELAYMIX:
    N_REGIMES: 3
    MAX_LAG: 15
    FORGETTING_FACTOR: 0.99
    CP_MAX_ITER: 100
    BOOTSTRAP_WINDOWS: 50
    UPDATE_INTERVAL: 200

  POSITIVE_AUGMENTOR:
    ENABLE: True
    NOISE_LEVEL: 0.1

  NEGATIVE_AUGMENTOR:
    ENABLE: True
    RELATION_BREAK_PROB: 0.33
    DELAY_BREAK_PROB: 0.33
    CROSS_REGIME_PROB: 0.34
    DELAY_SHIFT_RANGE: [-2, 2]

  LOSS:
    USE_REGIME_WEIGHTING: True

  SIM_THRESHOLD: 0.5
  SIM_THRESHOLD_START: 0.5
  SIM_THRESHOLD_END: 0.8
  SIM_THRESHOLD_SCHEDULE: True
  TEMPERATURE: 0.1

  PROTOTYPE_UPDATE_MOMENTUM: 0.2
  PROTOTYPE_MIN_CONFIDENCE: 0.6

  SCORER:
    LAMBDA_EMBED: 1.0
    LAMBDA_PRED: 0.5
    LAMBDA_DELAY: 0.2
    LAMBDA_UNCERTAINTY: 0.1

LSTM:
  NUM_LAYERS: 2
  HIDDEN_DIM: 512
  DROPOUT: 0.1

CUTS_PLUS:
  INPUT_STEP: 7
  DATA_PRED:
    PRED_STEP: 3
  GRAPH_DISCOV:
    LAMBDA_S_START: 0.1
    LAMBDA_S_END: 0.01
  TRAIN:
    CHECKPOINT_DIR: "${OUTPUT_ROOT}/checkpoints/cuts_plus"
  SOLVER:
    MAX_EPOCH: 5

SCORER:
  TYPE: "l2"
