SEED: 0
NUM_GPUS: 1
VISIBLE_DEVICES: 0
RESULT_DIR: 'results/rd_carots/swat'

DATA_LOADER:
  NUM_WORKERS: 4
  PIN_MEMORY: True
  DROP_LAST: True

DATA:
  BASE_DIR: 'data'
  NAME: 'SWaT'
  SCALE: 'standard'
  WIN_SIZE: 10
  TRAIN_STEP: 1
  TEST_STEP: 1
  N_VAR: 51
  TRAIN_RATIO: 0.9
  DOWNSAMPLE_RATE: 1

TRAIN:
  ENABLE: True
  BATCH_SIZE: 128
  SHUFFLE: True
  DROP_LAST: True
  SPLIT: 'train'
  CHECKPOINT_DIR: 'results/rd_carots/swat/checkpoints'
  RESUME: ''
  EVAL_PERIOD: 5
  PRINT_FREQ: 50
  METRIC_BEST: .inf
  IS_METRIC_LOWER_BETTER: True

VAL:
  ENABLE: True
  BATCH_SIZE: 256
  SHUFFLE: False
  DROP_LAST: False
  SPLIT: 'val'

TEST:
  ENABLE: True
  BATCH_SIZE: 256
  SHUFFLE: False
  DROP_LAST: False
  SPLIT: 'test'

MODEL:
  NAME: 'RDCAROTS'

RDCAROTS:
  IO_SCHEMA_PATH: 'configs/io_schema/SWaT.yaml'
  TEST_MODE: 'frozen'
  N_INPUTS: 21
  N_OUTPUTS: 30
  ENCODER_ARCH: 'lstm'

  PROJECTOR:
    INPUT_DIM: 512
    HIDDEN_DIM: 512
    OUTPUT_DIM: 512

  DELAYMIX:
    N_REGIMES: 3
    MAX_LAG: 20
    FORGETTING_FACTOR: 0.99
    BOOTSTRAP_WINDOWS: 200
    UPDATE_INTERVAL: 500
    CP_MAX_ITER: 200
    HANKEL_P: 10
    HANKEL_Q: 10
    INVERSE_TEMPERATURE: 1.0
    LOW_CONFIDENCE_THRESHOLD: 0.4
    UPDATE_SAMPLE_THRESHOLD: 200
    UPDATE_MISMATCH_THRESHOLD: 0.1
    UPDATE_MISMATCH_CONSECUTIVE: 10

  POSITIVE_AUGMENTOR:
    ENABLE: True
    NOISE_LEVEL: 0.05

  NEGATIVE_AUGMENTOR:
    ENABLE: True
    RELATION_BREAK_PROB: 0.33
    DELAY_BREAK_PROB: 0.33
    CROSS_REGIME_PROB: 0.34
    DELAY_SHIFT_RANGE: [-3, 3]

  LOSS:
    USE_REGIME_WEIGHTING: True

  SIM_THRESHOLD: 0.5
  SIM_THRESHOLD_SCHEDULE: False
  SIM_THRESHOLD_START: 0.3
  SIM_THRESHOLD_END: 0.7
  TEMPERATURE: 0.07
  PROTOTYPE_UPDATE_MOMENTUM: 0.1

  SCORER:
    LAMBDA_EMBED: 1.0
    LAMBDA_PRED: 0.5
    LAMBDA_DELAY: 0.3
    LAMBDA_UNCERTAINTY: 0.2

SOLVER:
  MAX_EPOCH: 50
  START_EPOCH: 0
  BASE_LR: 0.0001
  WARMUP_EPOCHS: 5
  WARMUP_START_LR: 0.00001

LSTM:
  HIDDEN_DIM: 512
  NUM_LAYERS: 2
  DROPOUT: 0.1

CUTS_PLUS:
  N_NODES: 51
  RESULT_DIR: 'results/rd_carots/swat/cuts_plus'
