MODEL:
  NAME: "RDCAROTS"

SEED: 0

DATA:
  BASE_DIR: "${DATA_ROOT}"
  NAME: "synthetic_regime_delay"
  SCALE: "standard"
  WIN_SIZE: 10
  TRAIN_STEP: 1
  TEST_STEP: 1
  N_VAR: 50
  TRAIN_RATIO: 0.8

DATA_LOADER:
  NUM_WORKERS: 4
  PIN_MEMORY: True
  DROP_LAST: True

TRAIN:
  ENABLE: True
  BATCH_SIZE: 128
  SHUFFLE: True
  DROP_LAST: True
  CHECKPOINT_DIR: "${OUTPUT_ROOT}/checkpoints"
  EVAL_PERIOD: 5
  PRINT_FREQ: 50

VAL:
  ENABLE: True
  BATCH_SIZE: 256

TEST:
  ENABLE: True
  BATCH_SIZE: 256

SOLVER:
  MAX_EPOCH: 50
  START_EPOCH: 0
  LR: 0.001
  WEIGHT_DECAY: 0.0001
  MOMENTUM: 0.9
  OPTIMIZER: "Adam"
  WARMUP_EPOCHS: 5
  GRADIENT_CLIP: True
  GRADIENT_CLIP_NORM: 1.0

RESULT_DIR: "${OUTPUT_ROOT}/results"

RDCAROTS:
  IO_SCHEMA_PATH: "configs/io_schema/synthetic_regime_delay.yaml"
  TEST_MODE: "frozen"
  N_INPUTS: 20
  N_OUTPUTS: 30

  ENCODER_ARCH: "lstm"

  PROJECTOR:
    INPUT_DIM: 512
    HIDDEN_DIM: 512
    OUTPUT_DIM: 512

  DELAYMIX:
    N_REGIMES: 3
    MAX_LAG: 20
    FORGETTING_FACTOR: 0.99
    CP_INIT: "svd"
    CP_MAX_ITER: 200
    CP_TOL: 0.000001
    HANKEL_P: 10
    HANKEL_Q: 10
    STATE_DIM_MAX: 20
    STABILITY_MARGIN: 0.95
    INVERSE_TEMPERATURE: 1.0
    LOW_CONFIDENCE_THRESHOLD: 0.4
    BOOTSTRAP_WINDOWS: 100
    UPDATE_INTERVAL: 500
    UPDATE_SAMPLE_THRESHOLD: 200
    UPDATE_MISMATCH_THRESHOLD: 0.1
    UPDATE_MISMATCH_CONSECUTIVE: 10

  POSITIVE_AUGMENTOR:
    ENABLE: True
    NOISE_LEVEL: 0.1

  NEGATIVE_AUGMENTOR:
    ENABLE: True
    RELATION_BREAK_PROB: 0.33
    DELAY_BREAK_PROB: 0.33
    CROSS_REGIME_PROB: 0.34
    DELAY_SHIFT_RANGE: [-3, 3]

  LOSS:
    USE_REGIME_WEIGHTING: True

  SIM_THRESHOLD: 0.5
  SIM_THRESHOLD_START: 0.5
  SIM_THRESHOLD_END: 0.9
  SIM_THRESHOLD_SCHEDULE: True
  TEMPERATURE: 0.1

  PROTOTYPE_UPDATE_MOMENTUM: 0.1
  PROTOTYPE_MIN_CONFIDENCE: 0.7

  SCORER:
    LAMBDA_EMBED: 1.0
    LAMBDA_PRED: 0.5
    LAMBDA_DELAY: 0.3
    LAMBDA_UNCERTAINTY: 0.2

LSTM:
  NUM_LAYERS: 2
  HIDDEN_DIM: 512
  DROPOUT: 0.1

CUTS_PLUS:
  INPUT_STEP: 7
  DATA_PRED:
    PRED_STEP: 3
  GRAPH_DISCOV:
    LAMBDA_S_START: 0.1
    LAMBDA_S_END: 0.01
  TRAIN:
    CHECKPOINT_DIR: "${OUTPUT_ROOT}/checkpoints/cuts_plus"
  SOLVER:
    MAX_EPOCH: 30

SCORER:
  TYPE: "l2"
